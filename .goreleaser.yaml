# goreleaser config — runs in CI on tag push.
#
#   $ git tag v0.1.0 && git push origin v0.1.0
#   $ goreleaser release --clean
#
# Produces, per release:
#   - linux/amd64 and linux/arm64 static binaries
#   - .tar.gz archives with binary + man page + LICENSE + README
#   - .deb and .rpm packages installing the binary + gzipped man page
#   - SHA-256 checksum file + signed if GPG is configured
#
# Phase 6.2 focuses on shipping a usable single binary; per-distro
# polish (systemd units, polkit rules, etc.) is intentionally out of
# scope — nft-tui is interactive, not a daemon.

version: 2

project_name: nft-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: nft-tui
    main: ./cmd/nft-tui
    binary: nft-tui
    env:
      # google/nftables is pure Go; CGO_ENABLED=0 produces a fully
      # static binary that runs on any glibc / musl host with no
      # cross-toolchain needed for arm64.
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: tarball
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README*
      - man/nft-tui.1
      - docs/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Keyless signing via Sigstore / cosign. We sign the checksums file
# only — verifying it once gives transitive trust over every artifact
# in the release (since each artifact's hash is in there). No private
# keys to manage; the workflow uses the GitHub Actions OIDC token to
# prove identity to Fulcio, which issues a short-lived cert that
# cosign uses to sign and stash in the public Rekor transparency log.
#
# To verify a release locally:
#
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github.com/dobrevit/nft-tui' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --cert checksums.txt.pem --signature checksums.txt.sig \
#     checksums.txt
signs:
  - cmd: cosign
    signature: '${artifact}.sig'
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--yes'
      - '--oidc-issuer=https://token.actions.githubusercontent.com'
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
    artifacts: checksum

# SBOM — one SPDX-JSON document per archive, generated by Syft and
# uploaded alongside the release assets. Lets downstream users (and
# scanners like Trivy / Grype) verify exactly which versions of which
# deps shipped in each release.
#
# Per-archive only: a `binary` SBOM produces the same `nft-tui.sbom.json`
# basename for linux/amd64 and linux/arm64 (the binary itself is just
# `nft-tui` in both builds), and the second upload then conflicts with
# the first via the GitHub release-asset uniqueness check. The archive
# variant uses the full archive name (which includes goos/goarch) so
# each architecture gets its own SBOM file, and the binary inside the
# archive is covered transitively by Syft scanning the archive contents.
sboms:
  - id: archive-sbom
    artifacts: archive
    documents:
      - "${artifact}.sbom.json"

nfpms:
  - id: deb-rpm
    package_name: nft-tui
    vendor: dobrevit
    homepage: https://github.com/dobrevit/nft-tui
    maintainer: nft-tui maintainers <devops@dobrev.it>
    description: |
      Terminal UI for inspecting and managing nftables rulesets.
      Tree-navigable explorer with live counters, /-filter, : global
      search, htop-style live monitor with per-rule sparklines, and
      a staged-edits workflow with dry-run, atomic commit, and a
      dead-man's switch on restore.
    license: MIT
    formats: [deb, rpm]
    dependencies:
      - nftables
    suggests:
      - libnftables1
    bindir: /usr/bin
    contents:
      - src: man/nft-tui.1
        dst: /usr/share/man/man1/nft-tui.1
        file_info:
          mode: 0644
      - src: LICENSE
        dst: /usr/share/doc/nft-tui/LICENSE
        file_info:
          mode: 0644
      - src: README.md
        dst: /usr/share/doc/nft-tui/README.md
        file_info:
          mode: 0644
      - src: examples/config.toml
        dst: /usr/share/doc/nft-tui/config.toml.example
        file_info:
          mode: 0644

      # Shell completions. Distros install bash completions to
      # /usr/share/bash-completion/completions, zsh to
      # /usr/share/zsh/site-functions, fish to
      # /usr/share/fish/vendor_completions.d.
      - src: completions/bash/nft-tui
        dst: /usr/share/bash-completion/completions/nft-tui
        file_info:
          mode: 0644
      - src: completions/zsh/_nft-tui
        dst: /usr/share/zsh/site-functions/_nft-tui
        file_info:
          mode: 0644
      - src: completions/fish/nft-tui.fish
        dst: /usr/share/fish/vendor_completions.d/nft-tui.fish
        file_info:
          mode: 0644

# Container images — one per arch, then a manifest list that joins
# them under a single tag for `docker pull` of either arch.
dockers:
  - id: nft-tui-amd64
    image_templates:
      - "ghcr.io/dobrevit/nft-tui:{{ .Tag }}-amd64"
      - "ghcr.io/dobrevit/nft-tui:v{{ .Major }}-amd64"
      - "ghcr.io/dobrevit/nft-tui:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    goarch: amd64
    extra_files:
      - examples/config.toml
      - man/nft-tui.1
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Terminal UI for inspecting and managing nftables"
      - "--label=org.opencontainers.image.url=https://github.com/dobrevit/nft-tui"
      - "--label=org.opencontainers.image.source=https://github.com/dobrevit/nft-tui"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"

  - id: nft-tui-arm64
    image_templates:
      - "ghcr.io/dobrevit/nft-tui:{{ .Tag }}-arm64"
      - "ghcr.io/dobrevit/nft-tui:v{{ .Major }}-arm64"
      - "ghcr.io/dobrevit/nft-tui:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    goarch: arm64
    extra_files:
      - examples/config.toml
      - man/nft-tui.1
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Terminal UI for inspecting and managing nftables"
      - "--label=org.opencontainers.image.url=https://github.com/dobrevit/nft-tui"
      - "--label=org.opencontainers.image.source=https://github.com/dobrevit/nft-tui"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/dobrevit/nft-tui:{{ .Tag }}"
    image_templates:
      - "ghcr.io/dobrevit/nft-tui:{{ .Tag }}-amd64"
      - "ghcr.io/dobrevit/nft-tui:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/dobrevit/nft-tui:v{{ .Major }}"
    image_templates:
      - "ghcr.io/dobrevit/nft-tui:v{{ .Major }}-amd64"
      - "ghcr.io/dobrevit/nft-tui:v{{ .Major }}-arm64"
  - name_template: "ghcr.io/dobrevit/nft-tui:latest"
    image_templates:
      - "ghcr.io/dobrevit/nft-tui:latest-amd64"
      - "ghcr.io/dobrevit/nft-tui:latest-arm64"

# Homebrew tap. goreleaser opens a PR (or commits directly) to a
# separate repository conventionally named `homebrew-<thing>`; the
# operator's `brew tap dobrevit/nft-tui` then makes the formula
# available via `brew install nft-tui`.
#
# Skipped at goreleaser time when the TAP_GITHUB_TOKEN secret isn't
# present, so contributors don't need to create the tap repo to
# cut a personal release.
brews:
  - name: nft-tui
    skip_upload: "{{ if not (envOrDefault \"TAP_GITHUB_TOKEN\" \"\") }}true{{ else }}false{{ end }}"
    repository:
      owner: dobrevit
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: nft-tui release bot
      email: devops@dobrev.it
    homepage: https://github.com/dobrevit/nft-tui
    description: Terminal UI for inspecting and managing nftables on Linux
    license: MIT
    # We don't build darwin binaries — nft-tui needs the Linux
    # nf_tables subsystem to do anything useful. Linuxbrew users get
    # the formula; macOS users see "no bottle for this platform".
    install: |
      bin.install "nft-tui"
      man1.install "man/nft-tui.1"
      bash_completion.install "completions/bash/nft-tui"
      zsh_completion.install "completions/zsh/_nft-tui"
      fish_completion.install "completions/fish/nft-tui.fish"
      doc.install "examples"
    test: |
      assert_match "nft-tui", shell_output("#{bin}/nft-tui -version")
    caveats: |
      nft-tui requires Linux and CAP_NET_ADMIN to inspect or manage
      the kernel ruleset. The userspace nftables tool must also be
      installed (apt install nftables, dnf install nftables, etc.).

# Snap package. `classic` confinement is required because nftables
# management is a host-level capability that strict-confinement
# can't grant. The .snap file is uploaded to the GitHub release
# as a downloadable artefact; goreleaser doesn't push to the Snap
# Store itself — that step is interactive and needs the
# maintainer's snapcraft login. After a release, push with:
#
#     snapcraft login
#     snapcraft push --release=stable nft-tui_vX.Y.Z_amd64.snap
#
# Users can install the artefact directly without the store:
#
#     snap install --dangerous --classic nft-tui_vX.Y.Z_amd64.snap
snapcrafts:
  - name: nft-tui
    summary: Terminal UI for inspecting and managing nftables
    description: |
      nft-tui is an interactive terminal UI for the Linux nftables
      firewall. It presents the live ruleset as a navigable tree
      (family → table → chain → rule), with per-rule packet/byte
      counters, search, an htop-style live monitor with per-rule
      sparklines, and (with --write) a staged-edits workflow
      backed by `nft -c -f` dry-run and atomic `nft -f` commit.
      Restore is guarded by a 60-second dead-man's switch with
      automatic rollback.
    grade: stable
    confinement: classic
    license: MIT
    base: core22
    publish: false
    apps:
      nft-tui:
        command: nft-tui
        plugs:
          - network
          - network-control

release:
  draft: true
  prerelease: auto

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
