# CI — runs on every PR and every push to main.
#
# Three jobs: lint (gofmt + vet), unit tests, and a real-kernel
# integration test against the runner's own nftables (touches root,
# but the runner is throwaway).

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        # gofmt -l . only checks the top-level directory; enumerate
        # every .go file so subpackage drift is caught.
        run: |
          files=$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))
          if [ -n "$files" ]; then
            echo "::error::gofmt would change the following files:"
            echo "$files"
            echo "Run 'gofmt -w .' or 'go fmt ./...' locally and recommit."
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go test ./...
        run: go test -race -timeout=120s ./...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install nftables
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables
      - name: build integration test binary
        run: go test -tags=integration -c -o nft-integration ./internal/nft
      - name: run as root (GHA runners restrict unshare -rn)
        # GitHub-hosted runners block unprivileged user-namespace
        # remapping (`unshare -rn` fails writing /proc/self/uid_map)
        # via an AppArmor profile. Running as root works because the
        # runner VM is throwaway — the only ruleset we could disrupt
        # is on a machine that's destroyed within minutes.
        #
        # Locally, `make integration` still uses `unshare -rn` so
        # contributors don't need root on their workstations.
        run: sudo ./nft-integration -test.v -test.run=Integration -test.timeout=60s
