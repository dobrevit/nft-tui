# CI — runs on every PR and every push to main.
#
# Three jobs: lint (gofmt + vet), unit tests (with coverage uploaded
# to Codecov), and a real-kernel integration test against the
# runner's own nftables (touches root, but the runner is throwaway).

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        # gofmt -l . only checks the top-level directory; enumerate
        # every .go file so subpackage drift is caught.
        run: |
          files=$(gofmt -l $(find . -name '*.go' -not -path './.git/*'))
          if [ -n "$files" ]; then
            echo "::error::gofmt would change the following files:"
            echo "$files"
            echo "Run 'gofmt -w .' or 'go fmt ./...' locally and recommit."
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: go test (with coverage)
        # -coverpkg scopes to ./internal/... — every package that
        # has tests — instead of ./..., which would also instrument
        # cmd/nft-tui (no tests, no use case). Instrumenting a main
        # package with no tests trips the GOCOVERDIR assembly path
        # which tries to invoke `go tool covdata`, and that tool
        # isn't shipped with toolchains downloaded via the
        # `toolchain` directive in go.mod — the test still runs,
        # but the job exits 1 with "no such tool covdata".
        #
        # Skipping cmd/nft-tui costs us nothing (no testable code)
        # while staying out of the covdata path entirely.
        #
        # Cross-package coverage (e.g. nft.Renderer code exercised
        # from staged tests) is still picked up — internal/... is
        # the union of every testable package.
        run: |
          go test -race -timeout=120s \
            -covermode=atomic \
            -coverpkg=./internal/... \
            -coverprofile=coverage.out \
            ./...
      - name: Upload coverage to Codecov
        # Tokenless upload works for public repos; set CODECOV_TOKEN
        # in repo secrets if you want a stable identity for the
        # uploads (recommended once the badge stabilises).
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: install nftables
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables
      - name: build integration test binary
        run: go test -tags=integration -c -o nft-integration ./internal/nft
      - name: run as root (GHA runners restrict unshare -rn)
        # GitHub-hosted runners block unprivileged user-namespace
        # remapping (`unshare -rn` fails writing /proc/self/uid_map)
        # via an AppArmor profile. Running as root works because the
        # runner VM is throwaway — the only ruleset we could disrupt
        # is on a machine that's destroyed within minutes.
        #
        # Locally, `make integration` still uses `unshare -rn` so
        # contributors don't need root on their workstations.
        run: sudo ./nft-integration -test.v -test.run=Integration -test.timeout=60s
