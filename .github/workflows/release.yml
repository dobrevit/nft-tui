# Release — triggered by pushing a vX.Y.Z tag.
#
# goreleaser reads .goreleaser.yaml at the repo root and produces:
#   - linux/amd64 + linux/arm64 static binaries (CGO_ENABLED=0)
#   - tar.gz archives with binary + man page + LICENSE + README + docs
#   - .deb and .rpm packages (no libc dependency — fully static)
#   - SHA-256 checksum file
#   - SPDX-JSON SBOMs per archive (via Syft)
#   - Keyless cosign signature + cert for the checksums file
#   - Multi-arch container images pushed to ghcr.io/dobrevit/nft-tui
#   - Homebrew formula (when TAP_GITHUB_TOKEN is set)
#   - Snap package (uploaded as a release artefact; not pushed to
#     the Snap Store — that's a separate manual step)
#
# Optional secrets:
#   TAP_GITHUB_TOKEN  PAT with `repo` scope on dobrevit/homebrew-tap.
#                     Skipped automatically when empty: brews.skip_upload
#                     in .goreleaser.yaml flips to "true" so the formula
#                     is generated locally but no PR opens.
#
# The GitHub release that gets created is a draft (per .goreleaser.yaml);
# the release-drafter workflow may have already prepared release notes
# that the maintainer reviews and publishes manually.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # create/update releases, upload assets
  id-token: write    # cosign keyless signing via GitHub OIDC → Fulcio
  packages: write    # push container images to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs full history + tags to compute the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Syft (SBOM generator)
        # goreleaser shells out to syft for the SBOM step; it needs
        # to be on PATH.
        uses: anchore/sbom-action/download-syft@v0

      - name: Install Cosign (release signing)
        # goreleaser shells out to cosign for the signs step. The
        # keyless flow uses the workflow's id-token to identify to
        # Fulcio; no secret keys to manage.
        uses: sigstore/cosign-installer@v3

      - name: Install snapcraft (for snap build)
        # goreleaser's snapcrafts: block invokes snapcraft to build
        # the .snap file. The runner image doesn't include it; snap
        # itself is preinstalled.
        run: sudo snap install snapcraft --classic

      - name: Set up QEMU
        # buildx needs QEMU to cross-build the arm64 image layer
        # from an amd64 runner.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional secret — when empty, .goreleaser.yaml's brews
          # block flips skip_upload to "true" so no tap PR opens.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
