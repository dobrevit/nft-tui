# Release — triggered by pushing a vX.Y.Z tag.
#
# goreleaser reads .goreleaser.yaml at the repo root and produces:
#   - linux/amd64 + linux/arm64 dynamic binaries (CGO_ENABLED=1)
#   - tar.gz archives with binary + man page + LICENSE + README + docs
#   - .deb and .rpm packages (libc6 dep auto-detected from the binary)
#   - SHA-256 checksum file
#
# The GitHub release that gets created is a draft (per .goreleaser.yaml);
# the release-drafter workflow may have already prepared release notes
# that the maintainer reviews and publishes manually.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # create/update releases, upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs full history + tags to compute the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-toolchain
        # CGO=1 + arm64 needs aarch64-linux-gnu-gcc on PATH. The
        # ubuntu-latest runner is amd64-only; package the cross-gcc
        # so goreleaser's per-arch override (CC=...) finds it.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
