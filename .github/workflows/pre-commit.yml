# pre-commit — runs every hook from .pre-commit-config.yaml across the
# entire tree on every PR and push. Contributors who skipped the
# local install still get the same enforcement, and the safety-net
# means we won't be bitten by a hand-edit that bypassed the local
# hook again.

name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          # Intentionally no `cache: pip` — we don't ship a
          # requirements.txt / pyproject.toml; pre-commit/action
          # below handles caching of pre-commit's own environment
          # under ~/.cache/pre-commit.

      - name: Install golangci-lint
        # The local pre-commit hook references golangci-lint with
        # `language: system`, so we just need the binary on PATH.
        # `go install` uses our pinned toolchain (toolchain go1.26.2)
        # which sidesteps the action's run-after-install behaviour —
        # passing `args:` to golangci-lint-action@v7 always wraps as
        # `golangci-lint run <args>`, and there's no v2 flag that
        # makes that a no-op. Direct `go install` builds + drops the
        # binary in $GOBIN ($HOME/go/bin) which setup-go has on PATH.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint --version

      - uses: pre-commit/action@v3.0.1
