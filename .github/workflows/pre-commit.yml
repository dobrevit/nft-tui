# pre-commit — runs every hook from .pre-commit-config.yaml across the
# entire tree on every PR and push. Contributors who skipped the
# local install still get the same enforcement, and the safety-net
# means we won't be bitten by a hand-edit that bypassed the local
# hook again.

name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          # Intentionally no `cache: pip` — we don't ship a
          # requirements.txt / pyproject.toml; pre-commit/action
          # below handles caching of pre-commit's own environment
          # under ~/.cache/pre-commit.

      - name: Install golangci-lint
        # Drop the prebuilt release binary on PATH.
        #
        # Why not go install? `go install pkg@version` builds against
        # the target package's go.mod, not ours, so our `toolchain
        # go1.26.2` pin in /go.mod doesn't influence it. The result
        # was a binary built with Go 1.25 on the CI runner, which
        # then refused our config: "the Go language version (go1.25)
        # used to build golangci-lint is lower than the targeted Go
        # version (1.26.2)".
        #
        # Why not golangci-lint-action? Action v7 always runs
        # `golangci-lint run <args>` after install; there's no
        # install-only mode. The dedicated golangci-lint.yml job
        # uses the action as intended. This pre-commit job only
        # needs the binary on PATH so the `language: system` hook
        # can find it.
        #
        # The official install.sh script downloads the upstream
        # release binary, which is built by the golangci-lint
        # maintainers with the right Go version for that release.
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$HOME/.local/bin" v2.12.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/golangci-lint" --version

      - uses: pre-commit/action@v3.0.1
