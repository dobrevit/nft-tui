# golangci-lint — curated linter set (see .golangci.yml).
#
# Runs on every PR + push to main. The official action handles
# matching the binary version with the config-file schema and caches
# the analysis between runs.
#
# Action / lint version compatibility matrix (the painful one):
#
#   golangci-lint-action@v6  →  golangci-lint v1 only
#   golangci-lint-action@v7+ →  golangci-lint v2 (refuses v1 pins)
#
# Our .golangci.yml is v2 schema (v2.12.x is the line built with
# Go 1.26 — matches our `toolchain go1.26.2` pin in go.mod), so we
# need action v7+ AND a v2.x version. The combination v6 + v2 or
# v7 + v1 both fail at startup.

name: golangci-lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
